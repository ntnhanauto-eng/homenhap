<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #2c3e50 0%, #0f171e 100%);
            min-height: 100vh;
        }

        /* --- HEADER THẤP VÀ GỌN GÀNG --- */
        .header {
            width: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            text-align: center;
            padding: 10px 0; /* Thu gọn thêm một chút để cân đối với 2 dòng */
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-title {
            font-size: 22px; 
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        /* Style cho phần thời gian */
        .header-time {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            margin-top: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, 120px);
            gap: 35px;
            padding: 40px 20px;
            max-width: 1000px; 
            margin: 0 auto;
            justify-content: center;
        }

        .item {
            text-decoration: none;
            color: white;
            text-align: center;
            transition: all 0.3s ease;
        }

        .icon {
            width: 100px;
            height: 100px;
            border-radius: 24px; 
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .label {
            margin-top: 15px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }

        .item:hover .icon {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.4);
        }

        @media (max-width: 768px) {
            .header-title { font-size: 20px; }
            .header-time { font-size: 12px; }
            .grid { grid-template-columns: repeat(auto-fit, 100px); gap: 25px; }
            .icon { width: 85px; height: 85px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-title">SMART SYSTEM</div>
    <div id="clock" class="header-time">Đang tải...</div>
</header>

<div class="grid">
    <a class="item" href="https://ntnhanauto-eng.github.io/block3dviewer/" target="_blank">
        <div class="icon"><img src="icon3D.jpg"></div>
        <div class="label">Block 3D</div>
    </a>
    <a class="item" href="https://ntnhanauto-eng.github.io/chamcong/" target="_blank">
        <div class="icon"><img src="cco.png"></div>
        <div class="label">Chấm công</div>
    </a>
    <a class="item" href="https://hr.hd-hvs.com/#/v10a2000/" target="_blank">
        <div class="icon"><img src="hr.jpg"></div>
        <div class="label">Bảng lương</div>
    </a>
    <a class="item" href="https://pp.hd-hvs.com/#/v20Menu/" target="_blank">
        <div class="icon"><img src="pp.jpg"></div>
        <div class="label">Production</div>
    </a>
    <a class="item" href="https://tqm.hd-hvs.com/#/v80Menu/" target="_blank">
        <div class="icon"><img src="tqm.jpg"></div>
        <div class="label">TQM</div>
    </a>
    <a class="item" href="https://www.windy.com" target="_blank">
        <div class="icon"><img src="windy.jpg"></div>
        <div class="label">Thời tiết</div>
    </a>
</div>

<script>
    function updateClock() {
        const now = new Date();
        
        // Định dạng giờ:phút:giây
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        
        // Định dạng ngày/tháng/năm
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();

        const timeString = hours + ":" + minutes + ":" + seconds + " - " + day + "/" + month + "/" + year;
        document.getElementById('clock').textContent = timeString;
    }

    // Cập nhật mỗi giây
    setInterval(updateClock, 1000);
    // Chạy lần đầu ngay khi load trang
    updateClock();
</script>

</body>
</html>
