<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #2c3e50 0%, #0f171e 100%);
            min-height: 100vh;
        }

        /* --- HEADER MỚI: XANH LÁ SÁNG --- */
        .header {
            width: 100%;
            /* Sử dụng màu xanh lá sáng (Emerald Green) */
            background-color: #2ecc71; 
            /* Hoặc dùng Gradient để trông xịn hơn */
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            text-align: center;
            padding: 25px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-title {
            font-size: 36px; /* Tăng kích thước chữ một chút */
            font-weight: 900; /* Siêu đậm */
            letter-spacing: 3px;
            color: #ffffff; /* Chữ trắng */
            text-transform: uppercase;
            margin: 0;
            /* Đổ bóng chữ để nổi bật trên nền sáng */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        /* --------------------------- */

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, 120px);
            gap: 40px;
            padding: 60px 20px;
            max-width: 1000px; 
            margin: 0 auto;
            justify-content: center;
        }

        .item {
            text-decoration: none;
            color: white;
            text-align: center;
            transition: all 0.3s ease;
        }

        .icon {
            width: 100px;
            height: 100px;
            border-radius: 24px; 
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .label {
            margin-top: 15px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }

        .item:hover .icon {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.4); /* Đổ bóng màu xanh nhẹ khi hover */
        }

        @media (max-width: 768px) {
            .header-title { font-size: 26px; }
            .grid { grid-template-columns: repeat(auto-fit, 100px); gap: 25px; }
            .icon { width: 85px; height: 85px; }
        }
    </style>
</head>
<body>

<header class="header">
    <h1 class="header-title">SMART SYSTEM</h1>
</header>

<div class="grid">
    <a class="item" href="https://ntnhanauto-eng.github.io/block3dviewer/" target="_blank">
        <div class="icon"><img src="icon3D.png"></div>
        <div class="label">Block 3D</div>
    </a>
    <a class="item" href="https://ntnhanauto-eng.github.io/chamcong/" target="_blank">
        <div class="icon"><img src="hr.jpg"></div>
        <div class="label">Chấm công</div>
    </a>
    <a class="item" href="https://hr.hd-hvs.com/#/v10a2000/" target="_blank">
        <div class="icon"><img src="hr.jpg"></div>
        <div class="label">Bảng lương</div>
    </a>
    <a class="item" href="https://pp.hd-hvs.com/#/v20Menu/" target="_blank">
        <div class="icon"><img src="pp.jpg"></div>
        <div class="label">Production</div>
    </a>
    <a class="item" href="https://tqm.hd-hvs.com/#/v80Menu/" target="_blank">
        <div class="icon"><img src="tqm.jpg"></div>
        <div class="label">TQM</div>
    </a>
    <a class="item" href="https://www.windy.com" target="_blank">
        <div class="icon"><img src="windy.jpg"></div>
        <div class="label">Thời tiết</div>
    </a>
</div>

</body>
</html>
