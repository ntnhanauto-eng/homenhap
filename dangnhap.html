<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đăng Nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
            transition: transform 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <div class="login-card p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Chào Mừng</h1>
            <p class="text-gray-500 mt-2">Vui lòng đăng nhập để tiếp tục</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tài khoản</label>
                <input type="text" id="username" required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                    placeholder="Nhập tên đăng nhập...">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <div id="errorMessage" class="hidden text-red-500 text-sm font-medium bg-red-50 p-3 rounded-lg border border-red-200">
                ⚠️ Tài khoản hoặc mật khẩu không chính xác!
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-lg hover:shadow-xl transition-all transform active:scale-95">
                Đăng Nhập
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            Hệ thống quản lý truy cập tự động
        </div>
    </div>

    <script>
        // Cấu hình tài khoản mẫu (Bạn có thể thay đổi ở đây)
       const USERS = [
    { username: "admin", password: "123456" },
    { username: "user", password: "user" }
];
        const HOME_URL = "https://ntnhanauto-eng.github.io/homenhap/";

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        // Xử lý sự kiện đăng nhập
       loginForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    const validUser = USERS.find(u => u.username === user && u.password === pass);

    if (validUser) {
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('loginTime', new Date().getTime());

       // 👇 CHÈN NGAY DƯỚI ĐÂY
         localStorage.setItem('role', 'admin'); 
       // hoặc 'user'


        
        localStorage.setItem('role', validUser.role);

        window.location.href = HOME_URL;
    } else {
        errorMessage.classList.remove('hidden');
    }
});

        // Logic bảo mật: Kiểm tra nếu người dùng quay lại trang này mà đã đăng nhập
        // Hoặc kiểm tra giả lập việc "vào thẳng" (Lưu ý: Bạn cần nhúng đoạn script kiểm tra vào trang đích để tối ưu)
        window.onload = function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn === 'true') {
                console.log("Bạn đã đăng nhập trước đó.");
                // Có thể tự động chuyển sang Home nếu muốn:
                // window.location.href = HOME_URL;
            }
        };
    </script>
</body>
</html>
